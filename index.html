<!DOCTYPE html>
<html>
<head>

<title>Spend Wise</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>

<body>
    
<header class="navbar">

<div class="logo">
<svg width="200" height="80" viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg">

<rect x="20" y="40" width="90" height="55" rx="10" fill="#1abc9c"/>

<rect x="90" y="55" width="35" height="25" rx="5" fill="#48c9b0"/>

<circle cx="100" cy="67" r="4" fill="white"/>

<path d="M20 70 Q120 10 200 30" stroke="#f39c12" stroke-width="6" fill="none"/>

<polygon points="195,25 210,30 198,38" fill="#f39c12"/>

<text x="20" y="110" font-size="26" font-family="Arial" font-weight="bold">
<tspan fill="#2c3e50">Spend</tspan>
<tspan fill="#27ae60">Wise</tspan>
</text>

</svg>
</div>



<div class="nav-actions">
<button class="mode" onclick="toggleTheme()">🌙</button>
</div>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Balance</h3>
<h2 id="balance">0</h2>
</div>

<div class="card">
<h3>Total Income</h3>
<h2 id="income">0</h2>
</div>

<div class="card">
<h3>Total Expense</h3>
<h2 id="expense">0</h2>
</div>

</div>

<input type="text" id="desc" placeholder="Description">

<input type="number" id="amount" placeholder="Amount">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Online Payment</option>
</select>

<button onclick="addTransaction()">Add</button>
<br>
<input type="text" id="search" placeholder="Search transaction..." onkeyup="searchTransaction()" >
<select onchange="filterCategory(this.value)">
<option value="all">All</option>
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
<option value="Bills">Bills</option>
<option value="Online Payment">Online Payment</option>
</select>





<table border="1">

<thead>
<tr>
<th>Description</th>
<th>Amount</th>
<th>Type</th>
<th>Category</th>
<th>Date</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>
<div class="charts">

<div class="chart-box">
<h2 class="ie">Income vs Expense</h2>
<canvas id="incomeExpenseChart"></canvas>
</div>

<div class="chart-box">
<h2>Monthly Chart</h2>
<canvas id="chart"></canvas>
</div>

<div class="chart-box">
<h2 class="cc">Expense by Category</h2>
<canvas id="categoryChart"></canvas>
</div>

</div>
</div>

<footer id="footer" class="px-3 footer-custom">
  <div class="container text-center">

    <div class="copyright-1">
      © March <b>Spend Wise</b>. All Rights Reserved
    </div>

    <div class="copyright-2">
      Found a bug? Submit an 
      <a href="https://github.com/durg83034/issues/new" target="_blank">Issue</a> 
      on 
      <a href="https://github.com/durg83034" target="_blank">GitHub</a>
    </div>

  </div>
</footer>

    
<script src="script.js"></script>

</body>
</html>
